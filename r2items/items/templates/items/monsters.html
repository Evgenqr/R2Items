{% extends 'base.html' %} 
{% load static %}

{% block content %} 
    <div class="col-md-12">
        <div class="row">

            {% for monster in monsters %} 
  <div class="card col-md-2 p-0 mb-3 mt-3">
            <img src="{{ monster.monster_img.url }}" alt="image" class="img-fluid rounded-start" width="100px" height="150px"/>
            <div class="card-body text-center">
                <h6 class="card-title"> <a href="#" class="text-decoration-none">
                {{ monster.name }} -----  </a></h5><br>
                {% for location in monster.locations.all %}
                {{ location.title }}
          {% endfor %}
            
            </div>
            <div class="card-body text-center">
            <a href="" class="btn btn-primary">Подробнее</a>
           </div>
        </div>
    {% endfor %}    
    </div>    
                                         
</div>
{% endblock content %}
